<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore - Premium Healthcare</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">MediCore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#booking-section">Book Now</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section d-flex align-items-center">
        <div class="container text-center">
            <h1 class="display-3 fw-bold mb-4">Your Health, Our Priority</h1>
            <p class="lead mb-5 text-muted">Book your appointment with our top healthcare professionals in seconds.</p>
            <a href="#booking-section" class="btn btn-primary btn-lg px-5 shadow-sm rounded-pill">Book Appointment</a>
        </div>
    </header>

    <!-- Booking Section -->
    <section id="booking-section" class="py-5 bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="glass-card p-5 form-container">
                        <h2 class="text-center fw-bold mb-4">Book an Appointment</h2>
                        <div id="booking-alert" class="alert d-none" role="alert"></div>
                        <form id="booking-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="patient_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="patient_email" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Phone Number</label>
                                    <input type="tel" class="form-control" id="patient_phone" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Select Doctor</label>
                                    <select class="form-select" id="doctor_name" required>
                                        <option value="" selected disabled>Choose a specialist...</option>
                                        <option value="Dr. Sarah Johnson (Cardiology)">Dr. Sarah Johnson (Cardiology)</option>
                                        <option value="Dr. Michael Chen (Neurology)">Dr. Michael Chen (Neurology)</option>
                                        <option value="Dr. Emily Davis (Pediatrics)">Dr. Emily Davis (Pediatrics)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Date</label>
                                    <input type="date" class="form-control" id="appointment_date" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Time</label>
                                    <input type="time" class="form-control" id="appointment_time" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Symptoms (Optional)</label>
                                    <textarea class="form-control" id="symptoms" rows="3"></textarea>
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-primary btn-lg px-5 rounded-pill shadow w-100" id="submit-btn">Confirm Booking</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
